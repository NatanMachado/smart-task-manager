spring:
  task:
    scheduling:
      enabled: true
  application:
    name: SmartTaskManager
  datasource:
    url: jdbc:postgresql://localhost:5433/taskmanagerdb
    driverClassName: org.postgresql.Driver
    username: postgres
    password: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  profiles:
    # Profiles: local, dev, test, staging, prod, or ci
    # default profile is set to 'dev' for development environment
    active: dev 
server:
  port: 8080

tasks:
  reminderDays: 3
  cleanupDays: 90
  archiveDays: 30


